{{- if .Values.httpRoute.enabled }}
{{- $host := .Values.ingress.host }}
---
# SnippetsFilter — injects "return 403;" for /v2/_catalog to block registry catalog browsing.
# Requires nginx-gateway-fabric or another NGF-compatible Gateway API implementation.
apiVersion: gateway.nginx.org/v1alpha1
kind: SnippetsFilter
metadata:
  name: {{ include "ephemeron.fullname" . }}-deny-catalog
  labels:
    {{- include "ephemeron.manager.labels" . | nindent 4 }}
spec:
  snippets:
    - context: http.server.location
      value: "return 403;"
---
# HTTPRoute for ephemeron-manager (web UI)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ephemeron.manager.fullname" . }}
  labels:
    {{- include "ephemeron.manager.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - name: {{ .name }}
      namespace: {{ .namespace }}
      group: {{ .group | default "gateway.networking.k8s.io" }}
      kind: {{ .kind | default "Gateway" }}
    {{- end }}
  {{- if $host }}
  hostnames:
    - {{ $host | quote }}
  {{- end }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: {{ include "ephemeron.manager.fullname" . }}
          group: ""
          kind: Service
          port: 8000
          weight: 1
---
# HTTPRoute for ephemeron-registry (Docker registry at /v2)
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: {{ include "ephemeron.registry.fullname" . }}
  labels:
    {{- include "ephemeron.registry.labels" . | nindent 4 }}
spec:
  parentRefs:
    {{- range .Values.httpRoute.parentRefs }}
    - name: {{ .name }}
      namespace: {{ .namespace }}
      group: {{ .group | default "gateway.networking.k8s.io" }}
      kind: {{ .kind | default "Gateway" }}
    {{- end }}
  {{- if $host }}
  hostnames:
    - {{ $host | quote }}
  {{- end }}
  rules:
    # Block /v2/_catalog (registry catalog browsing) — replaces server-snippet annotation
    - matches:
        - path:
            type: Exact
            value: /v2/_catalog
      filters:
        - type: ExtensionRef
          extensionRef:
            group: gateway.nginx.org
            kind: SnippetsFilter
            name: {{ include "ephemeron.fullname" . }}-deny-catalog
    # Route all other /v2 paths to registry
    - matches:
        - path:
            type: PathPrefix
            value: /v2
      backendRefs:
        - name: {{ include "ephemeron.registry.fullname" . }}
          group: ""
          kind: Service
          port: 5000
          weight: 1
{{- end }}
