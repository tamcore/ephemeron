name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

env:
  REPOSITORY: ghcr.io/${{ github.repository_owner }}/ephemeron
  CHART_DIR: deploy/helm
  CHART_REPOSITORY: ghcr.io/${{ github.repository_owner }}/charts

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0

      - uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'

      - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KO_DOCKER_REPO: ${{ env.REPOSITORY }}
        with:
          version: latest
          args: release

  chart-release:
    runs-on: ubuntu-latest
    needs: [goreleaser]

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 1

      - name: Install Helm
        uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Login to registry
        run: |
          echo '${{ secrets.GITHUB_TOKEN }}' | \
            helm registry login \
              -u '${{ github.actor }}' \
              --password-stdin \
              ghcr.io

      - name: Update Chart
        env:
          VERSION: "${{ github.ref_name }}"
          REPOSITORY: "${{ env.REPOSITORY }}"
        run: |
          yq -i '.version = strenv(VERSION)' '${{ env.CHART_DIR }}/Chart.yaml'
          yq -i '.appVersion = strenv(VERSION)' '${{ env.CHART_DIR }}/Chart.yaml'

      - name: Package chart
        run: |
          echo PACKAGE=$(helm package ${{ env.CHART_DIR }} -u | cut -d " " -f 8) >> ${GITHUB_ENV}

      - name: Push chart
        run: |
          helm push \
            ${{ env.PACKAGE }} \
            oci://${{ env.CHART_REPOSITORY }}

      - name: Template Chart
        run: |
          helm template \
            ${GITHUB_REPOSITORY#*/} \
            ${{ env.CHART_DIR }} > install.yaml

      - name: Upload manifest to release
        uses: svenstaro/upload-release-action@29e53e917877a24fad85510ded594ab3c9ca12de # v2
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: install.yaml
          tag: ${{ github.ref }}
