name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: read

jobs:
  lint-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test -v ./...

      - name: Lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9
        with:
          version: v2.12.2 # renovate: datasource=github-releases depName=golangci/golangci-lint

  helm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: azure/setup-helm@9bc31f4ebc9c6b171d7bfbaa5d006ae7abdb4310 # v5

      - name: Build chart dependencies
        run: helm dependency build deploy/helm

      - name: Lint chart
        run: helm lint deploy/helm

      - name: Template chart (default values)
        run: helm template ephemeron deploy/helm > /dev/null

      - name: Template chart (immutability example values)
        run: helm template ephemeron deploy/helm -f deploy/helm/values-with-immutability.yaml > /dev/null

      - name: Template chart (s3 storage mode)
        run: helm template ephemeron deploy/helm --set registry.storage.mode=s3 --set registry.replicas=2 > /dev/null

  e2e:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'

      - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - name: Build manager image with ko
        run: |
          MANAGER_IMAGE=$(KO_DOCKER_REPO=ko.local ko build --bare ./cmd/)
          echo "MANAGER_IMAGE=$MANAGER_IMAGE" >> "$GITHUB_ENV"
          echo "Built image: $MANAGER_IMAGE"

      - name: Start stack
        run: docker compose up -d --wait --wait-timeout 60

      - name: Verify manager health
        run: |
          curl -sf http://localhost:8000/ | grep -q "Ephemeral Container Registry"
          echo "✅ Landing page OK"

      - name: Push image to local registry
        run: |
          IMAGE="localhost:5000/e2e-test:5m"
          docker pull busybox:latest
          docker tag busybox:latest "$IMAGE"
          docker push "$IMAGE"
          echo "✅ Push OK"

      - name: Pull image back
        run: |
          IMAGE="localhost:5000/e2e-test:5m"
          docker rmi "$IMAGE"
          docker pull "$IMAGE"
          echo "✅ Pull OK"

      - name: Run pulled image
        run: |
          docker run --rm localhost:5000/e2e-test:5m echo "hello from e2e"
          echo "✅ Run OK"

      - name: Verify TTL tracking
        run: |
          # Give webhook a moment to process
          sleep 2
          METRICS=$(curl -sf http://localhost:9090/metrics)
          echo "$METRICS" | grep -q 'ephemeron_hooks_images_tracked_total'
          TRACKED=$(echo "$METRICS" | grep '^ephemeron_hooks_images_tracked_total' | awk '{print $2}')
          if [ "$TRACKED" -lt 1 ]; then
            echo "❌ Expected at least 1 tracked image, got $TRACKED"
            exit 1
          fi
          echo "✅ Metrics OK — $TRACKED image(s) tracked"

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs

  e2e-s3:
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: 'go.mod'

      - uses: ko-build/setup-ko@61b4d1d396f5b2e7d6bb6fefdce3dc38d1a13445 # v0.10

      - name: Build manager image with ko
        run: |
          MANAGER_IMAGE=$(KO_DOCKER_REPO=ko.local ko build --bare ./cmd/)
          echo "MANAGER_IMAGE=$MANAGER_IMAGE" >> "$GITHUB_ENV"
          echo "Built image: $MANAGER_IMAGE"

      - name: Start stack with S3 backend
        run: docker compose -f docker-compose.s3.yaml up -d --wait --wait-timeout 90

      - name: Verify manager health
        run: |
          curl -sf http://localhost:8000/ | grep -q "Ephemeral Container Registry"
          echo "✅ Landing page OK"

      - name: Push image to local registry
        run: |
          IMAGE="localhost:5000/e2e-s3-test:5m"
          docker pull busybox:latest
          docker tag busybox:latest "$IMAGE"
          docker push "$IMAGE"
          echo "✅ Push OK"

      - name: Pull image back
        run: |
          IMAGE="localhost:5000/e2e-s3-test:5m"
          docker rmi "$IMAGE"
          docker pull "$IMAGE"
          echo "✅ Pull OK"

      - name: Run pulled image
        run: |
          docker run --rm localhost:5000/e2e-s3-test:5m echo "hello from e2e-s3"
          echo "✅ Run OK"

      - name: Verify TTL tracking
        run: |
          sleep 2
          METRICS=$(curl -sf http://localhost:9090/metrics)
          echo "$METRICS" | grep -q 'ephemeron_hooks_images_tracked_total'
          TRACKED=$(echo "$METRICS" | grep '^ephemeron_hooks_images_tracked_total' | awk '{print $2}')
          if [ "$TRACKED" -lt 1 ]; then
            echo "❌ Expected at least 1 tracked image, got $TRACKED"
            exit 1
          fi
          echo "✅ Metrics OK — $TRACKED image(s) tracked"

      - name: Dump logs on failure
        if: failure()
        run: docker compose -f docker-compose.s3.yaml logs
